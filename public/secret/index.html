<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Secret Pages</title>
<style>
:root {
  --bg: #0a0a12;
  --surface: #13131f;
  --border: #252540;
  --text: #e2e8f0;
  --muted: #64748b;
  --accent: #6366f1;
  --accent2: #8b5cf6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.subtitle { color: var(--muted); font-size: 14px; margin-bottom: 40px; }
.container { width: 100%; max-width: 600px; }
.section { margin-bottom: 24px; }
.section-name { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; padding-left: 4px; display: flex; align-items: center; gap: 8px; }
.file-list { display: flex; flex-direction: column; gap: 6px; }
a.file {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  text-decoration: none;
  transition: all 0.15s;
}
a.file:hover {
  border-color: var(--accent);
  background: #1a1a2e;
  transform: translateX(4px);
}
.file-icon { font-size: 20px; flex-shrink: 0; }
.file-info { flex: 1; }
.file-name { font-weight: 600; font-size: 15px; }
.file-ext { color: var(--muted); font-size: 12px; margin-top: 2px; }
.file-arrow { color: var(--muted); font-size: 18px; transition: color 0.15s; }
a.file:hover .file-arrow { color: var(--accent); }
.loading { color: var(--muted); font-size: 14px; text-align: center; padding: 40px; }
.empty { color: var(--muted); font-size: 14px; text-align: center; padding: 40px; }
.indent { margin-left: 20px; }
.footer { margin-top: 60px; color: var(--muted); font-size: 12px; }
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Secret Pages</h1>
<p class="subtitle">Unlisted pages hosted on NoBrainy</p>

<div class="container" id="container">
  <div class="loading">Loading...</div>
</div>

<div class="footer">
  <a href="https://nobrainy.com">nobrainy.com</a>
</div>

<script>
const ICONS = {
  html: '🌐', htm: '🌐', pdf: '📄', png: '🖼️', jpg: '🖼️', jpeg: '🖼️',
  gif: '🖼️', svg: '🎨', mp4: '🎬', mp3: '🎵', json: '📋', csv: '📊',
  txt: '📝', md: '📝', zip: '📦', default: '📄', folder: '📁',
};

function getIcon(name, type) {
  if (type === 'directory') return ICONS.folder;
  const ext = name.split('.').pop().toLowerCase();
  return ICONS[ext] || ICONS.default;
}

function prettyName(name) {
  return name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function renderEntries(entries, parentPath, depth) {
  const wrapper = document.createElement('div');
  if (depth > 0) wrapper.className = 'indent';

  entries.forEach(entry => {
    if (entry.type === 'directory') {
      const section = document.createElement('div');
      section.className = 'section';
      section.innerHTML = `<div class="section-name">${ICONS.folder} ${entry.name}</div>`;
      const list = document.createElement('div');
      list.className = 'file-list';
      if (entry.children && entry.children.length > 0) {
        const childEl = renderEntries(entry.children, parentPath + entry.name + '/', depth + 1);
        list.appendChild(childEl);
      }
      section.appendChild(list);
      wrapper.appendChild(section);
    } else {
      const a = document.createElement('a');
      a.className = 'file';
      a.href = '/secret/' + parentPath + entry.name;
      a.innerHTML = `
        <span class="file-icon">${getIcon(entry.name, entry.type)}</span>
        <div class="file-info">
          <div class="file-name">${prettyName(entry.name)}</div>
          <div class="file-ext">${entry.name}</div>
        </div>
        <span class="file-arrow">&rarr;</span>
      `;
      wrapper.appendChild(a);
    }
  });

  return wrapper;
}

fetch('/api/secret')
  .then(r => r.json())
  .then(data => {
    const container = document.getElementById('container');
    container.innerHTML = '';
    if (!data.files || data.files.length === 0) {
      container.innerHTML = '<div class="empty">No pages yet. Drop files in public/secret/ and deploy.</div>';
      return;
    }
    container.appendChild(renderEntries(data.files, '', 0));
  })
  .catch(() => {
    document.getElementById('container').innerHTML = '<div class="empty">Could not load file listing.</div>';
  });
</script>

</body>
</html>
