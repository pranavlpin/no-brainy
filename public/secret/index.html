<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Secret Pages</title>
<style>
:root {
  --bg: #0a0a12;
  --surface: #13131f;
  --border: #252540;
  --text: #e2e8f0;
  --muted: #64748b;
  --accent: #6366f1;
  --accent2: #8b5cf6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.subtitle { color: var(--muted); font-size: 14px; margin-bottom: 40px; }
.container { width: 100%; max-width: 600px; }
.folder { margin-bottom: 24px; }
.folder-name { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; padding-left: 4px; }
.file-list { display: flex; flex-direction: column; gap: 6px; }
a.file {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  text-decoration: none;
  transition: all 0.15s;
}
a.file:hover {
  border-color: var(--accent);
  background: #1a1a2e;
  transform: translateX(4px);
}
.file-icon { font-size: 20px; flex-shrink: 0; }
.file-info { flex: 1; }
.file-name { font-weight: 600; font-size: 15px; }
.file-desc { color: var(--muted); font-size: 12px; margin-top: 2px; }
.file-arrow { color: var(--muted); font-size: 18px; transition: color 0.15s; }
a.file:hover .file-arrow { color: var(--accent); }
.footer { margin-top: 60px; color: var(--muted); font-size: 12px; }
.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Secret Pages</h1>
<p class="subtitle">Unlisted pages hosted on NoBrainy</p>

<div class="container">

  <!-- Root files -->
  <div class="folder">
    <div class="file-list" id="file-list">
      <!-- Files are auto-populated by script below -->
    </div>
  </div>

</div>

<div class="footer">
  <a href="https://nobrainy.com">nobrainy.com</a>
</div>

<script>
// Auto-discover HTML files in /secret/ via fetching this directory
// Fallback: hardcoded list updated on deploy
const PAGES = [
  { name: 'engineering.html', title: 'Engineering Mastery', desc: 'Interactive guide to software engineering concepts', icon: '⚙️' },
];

const list = document.getElementById('file-list');
PAGES.forEach(p => {
  const a = document.createElement('a');
  a.className = 'file';
  a.href = `/secret/${p.name}`;
  a.innerHTML = `
    <span class="file-icon">${p.icon}</span>
    <div class="file-info">
      <div class="file-name">${p.title}</div>
      <div class="file-desc">${p.desc}</div>
    </div>
    <span class="file-arrow">&rarr;</span>
  `;
  list.appendChild(a);
});
</script>

</body>
</html>
