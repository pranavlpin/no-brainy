name: Deploy to Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1
  SERVICE_NAME: nobrainy-staging
  IMAGE_NAME: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nobrainy/app

jobs:
  deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:staging-latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:staging-latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
          secrets: |
            DATABASE_URL=nobrainy-database-url:latest
            NEXTAUTH_SECRET=nobrainy-nextauth-secret:latest
            NEXTAUTH_URL=nobrainy-nextauth-url:latest
            GOOGLE_CLIENT_ID=nobrainy-google-client-id:latest
            GOOGLE_CLIENT_SECRET=nobrainy-google-client-secret:latest
          flags: |
            --port=3000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --allow-unauthenticated
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:nobrainy-db

      - name: Run database migrations
        run: |
          gcloud run jobs create nobrainy-migrate-staging \
            --image=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --set-secrets=DATABASE_URL=nobrainy-database-url:latest \
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:nobrainy-db \
            --command="npx" \
            --args="prisma,migrate,deploy" \
            --max-retries=1 \
            --task-timeout=300s \
            2>/dev/null || \
          gcloud run jobs update nobrainy-migrate-staging \
            --image=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --set-secrets=DATABASE_URL=nobrainy-database-url:latest \
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:nobrainy-db
          gcloud run jobs execute nobrainy-migrate-staging \
            --region=${{ env.GCP_REGION }} \
            --wait

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format="value(status.url)")
          echo "Staging deployed to: $URL"
          echo "## Deployed to Staging" >> $GITHUB_STEP_SUMMARY
          echo "URL: $URL" >> $GITHUB_STEP_SUMMARY
